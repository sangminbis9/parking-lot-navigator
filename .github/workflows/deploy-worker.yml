name: Deploy Worker

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "shared-types/**"
      - "worker-backend/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck Worker
        working-directory: worker-backend
        run: pnpm exec tsc --noEmit

      - name: Deploy Worker
        working-directory: worker-backend
        run: pnpm exec wrangler deploy

      - name: Refresh discovery cache
        if: ${{ env.SYNC_ADMIN_TOKEN != '' }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${SYNC_ADMIN_TOKEN}" \
            "https://parking-lot-navigator-api.parkingnav.workers.dev/admin/sync-discovery?kinds=festivals,events"

      - name: Refresh local event candidates
        if: ${{ env.SYNC_ADMIN_TOKEN != '' }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${SYNC_ADMIN_TOKEN}" \
            "https://parking-lot-navigator-api.parkingnav.workers.dev/admin/sync-local-events"
