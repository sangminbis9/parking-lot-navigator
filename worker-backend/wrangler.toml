name = "parking-lot-navigator-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]
minify = true

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"
PARKING_PROVIDER_MODE = "real"
DEFAULT_SEARCH_RADIUS_METERS = "800"
DEFAULT_DISCOVER_RADIUS_METERS = "20000"
STALE_THRESHOLD_SECONDS = "600"
CACHE_TTL_SECONDS = "45"
DISCOVER_CACHE_TTL_SECONDS = "21600"
DISCOVERY_SYNC_CONCURRENCY = "4"
DISCOVERY_SYNC_FETCH_TIMEOUT_MS = "8000"
FESTIVAL_PROVIDER_ENABLED = "true"
EVENT_PROVIDER_ENABLED = "true"
LOCAL_EVENT_PROVIDER_ENABLED = "true"
LOCAL_EVENT_AUTO_APPROVE_MIN_SCORE = "0.75"
LOCAL_EVENT_SEARCH_MAX_QUERIES = "17"
LOCAL_EVENT_MAX_KAKAO_LOOKUPS = "30"
LOCAL_EVENT_BLOG_DISPLAY = "20"
LOCAL_EVENT_KAKAO_RADIUS_METERS = "20000"
AGENT_HEAD_INCLUDE_REJECTED = "true"
AGENT_HEAD_BATCH_SIZE = "15"
AGENT_HEAD_MAX_BATCHES = "3"
AGENT_PIXEL_ENABLED = "true"
AGENT_PIXEL_BATCH_SIZE = "12"
NAVER_SEARCH_BASE_URL = "https://openapi.naver.com"
KAKAO_LOCAL_BASE_URL = "https://dapi.kakao.com"
SEOUL_OPEN_DATA_BASE_URL = "http://openapi.seoul.go.kr:8088"
PUBLIC_DATA_ENV = "production"
PUBLIC_DATA_BASE_URL = "https://apis.data.go.kr"
NATIONAL_PARKING_DATA_BASE_URL = "https://api.data.go.kr"
KOPIS_BASE_URL = "http://www.kopis.or.kr"
KOPIS_MAX_PAGES = "2"
KOPIS_DETAIL_MAX_ITEMS = "10"
KCISA_BASE_URL = "https://api.kcisa.kr"
MERCHANT_PUBLIC_BASE_URL = "https://parking-lot-navigator-api.parkingnav.workers.dev"
TOSS_CLIENT_KEY = "test_gck_docs_OAQ92ymxN34nW1Gq9DRBaajRKgw6"
TAGGING_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
TAGGING_BATCH_SIZE = "20"
TAGGING_RUN_MAX_ROWS = "200"
TAGGING_CONCURRENCY = "2"

[triggers]
crons = ["* * * * *", "*/9 * * * *", "15 * * * *", "30 */3 * * *", "*/20 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "parking-lot-navigator"
database_id = "31c04846-57d5-4e38-82b6-2d7b3a0dfbee"

[[r2_buckets]]
binding = "MERCHANT_IMAGES"
bucket_name = "merchant-images"

[ai]
binding = "AI"
