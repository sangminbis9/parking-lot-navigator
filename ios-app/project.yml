name: ParkingLotNavigator
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "16.0"
configs:
  Debug: debug
  Release: release
packages:
  KakaoMapsSDK:
    url: https://github.com/kakao-mapsSDK/KakaoMapsSDK-SPM.git
    from: "2.12.10"
  KakaoOpenSDK:
    url: https://github.com/kakao/kakao-ios-sdk.git
    from: "2.27.2"
settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: 95N46NPCJ7
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 46
    APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO
    INFOPLIST_OUTPUT_FORMAT: XML
targets:
  ParkingLotNavigator:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - Integrations/AppIntents
      - Integrations/NavigationBridge
      - Integrations/DeepLinks
      - path: Resources
        excludes:
          - IntentsInfo.plist
          - ShareExtensionInfo.plist
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        INFOPLIST_FILE: Resources/AppInfo.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ParkingLotNavigator.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Integrations/NavigationBridge/ParkingLotNavigator-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO
        INFOPLIST_OUTPUT_FORMAT: XML
    dependencies:
      - target: ParkingShareExtension
      - package: KakaoMapsSDK
        product: KakaoMapsSDK-SPM
      - package: KakaoOpenSDK
        product: KakaoSDKNavi
  ParkingShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - Integrations/ShareExtension
      - Core/Models
      - Core/Storage
      - Integrations/DeepLinks
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(SHARE_EXTENSION_BUNDLE_ID)
        INFOPLIST_FILE: Resources/ShareExtensionInfo.plist
        CODE_SIGN_ENTITLEMENTS: Resources/ParkingLotNavigator.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING: NO
        INFOPLIST_OUTPUT_FORMAT: XML
  ParkingLotNavigatorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ParkingLotNavigator
